#version: "3.9"

networks:
  inside_net:
    driver: bridge
    # driver_opts:
    #   com.docker.network.bridge.name: br-inside
    ipam:
      config:
        - subnet: 172.30.0.0/24

  outside_net:
    driver: bridge
    # driver_opts:
    #   com.docker.network.bridge.name: br-outside
    ipam:
      config:
        - subnet: 172.31.0.0/24


services:

  # Gateway
  gw:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-gw
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      net.ipv4.ip_forward: "1"
    networks:
      inside_net:
        ipv4_address: 172.30.0.254
      outside_net:
         ipv4_address: 172.31.0.254
    command: >
      sh -c "
        # Flush old rules 
        iptables -F && iptables -t nat -F;
        # allow forwarding between inside and outside
        iptables -P FORWARD ACCEPT;

        # NAT: make traffic from outside_net to inside_net appear as coming from GW (172.30.0.1)
        iptables -t nat -A POSTROUTING -s 172.31.0.0/24 -d 172.30.0.0/24 -j MASQUERADE;

        # Allow established sessions
        iptables -A FORWARD -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT;

        echo 'GW ready: routing + NAT enabled';
        sleep infinity
      "
          

  server:
    image: nginx:latest
    container_name: master-thesis-server
    networks:
      inside_net:
        ipv4_address: 172.30.0.10

  server_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-server-route
    network_mode: "service:server"
    depends_on:
      - server
      - gw
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "
        # replace default route inside the server network namespace
        ip route del default;
        ip route add default via 172.30.0.254;
        echo '[server_route] default route set to 172.30.0.254';
        sleep infinity
      "



  client1:
    image: curlimages/curl:latest
    container_name: master-thesis-client1
    command: sleep infinity
    networks:
      inside_net:
        ipv4_address: 172.30.0.11

  # client2:
  #   image: curlimages/curl
  #   command: sleep infinity
  #   networks:
  #     testnet:
  #       ipv4_address: 172.30.0.12

  # client3:
  #   image: curlimages/curl
  #   command: sleep infinity
  #   networks:
  #     testnet:
  #       ipv4_address: 172.30.0.13
      
  attacker:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-attacker
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      outside_net:
        ipv4_address: 172.31.0.100
    command: >
      sh -c "
        # Route traffic to inside_net via the gateway on outside_net
        ip route add 172.30.0.0/24 via 172.31.0.254;
        sleep infinity
      "

  capture:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-capture
    network_mode: "service:server"
    depends_on:
      - server
    cap_add:
    - NET_ADMIN
    - NET_RAW
    volumes:
    - ./pcaps:/pcaps
    command: >
      sh -c "tcpdump -U -i eth0 -nn -s 0
      'host 172.30.0.10 and (tcp or udp or icmp) and not arp'
      -w /pcaps/server_capture.pcap"