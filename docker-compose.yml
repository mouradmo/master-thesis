#version: "3.9"

networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:
  server:
    image: nginx
    networks:
      - testnet
  #  ports:
  #    - "8080:80"

  client1:
    image: curlimages/curl
    command: sleep infinity
    networks:
      - testnet

  client2:
    image: curlimages/curl
    command: sleep infinity
    networks:
      - testnet

  client3:
    image: curlimages/curl
    command: sleep infinity
    networks:
      - testnet
      
  attacker:
    image: nicolaka/netshoot
    command: sleep infinity
    networks:
      - testnet

  sensor:
    image: nicolaka/netshoot
    network_mode: host
    cap_add:
    - NET_ADMIN
    - NET_RAW
    volumes:
    - ./pcaps:/pcaps
    command: >
      sh -c "tcpdump -i any -nn -s 0
      net 172.30.0.0/16
      -w /pcaps/capture.pcap"
