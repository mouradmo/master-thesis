services:
  gw:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      A_server_net:
        ipv4_address: 172.30.10.254
      A_internal_host_01_net:
        ipv4_address: 172.30.11.254
      A_internal_host_02_net:
        ipv4_address: 172.30.12.254
      B_external_host_01_net:
        ipv4_address: 172.31.11.254
      B_external_host_02_net:
        ipv4_address: 172.31.12.254
      C_external_host_01_net:
        ipv4_address: 172.32.11.254
      C_external_host_02_net:
        ipv4_address: 172.32.12.254
      C_external_host_03_net:
        ipv4_address: 172.32.13.254
      D_external_host_01_net:
        ipv4_address: 172.33.11.254
      D_external_host_02_net:
        ipv4_address: 172.33.12.254
      E_external_host_01_net:
        ipv4_address: 172.34.11.254
      E_external_host_02_net:
        ipv4_address: 172.34.12.254
      E_external_host_03_net:
        ipv4_address: 172.34.13.254
      F_external_host_01_net:
        ipv4_address: 172.35.11.254
      F_external_host_02_net:
        ipv4_address: 172.35.12.254
      F_external_host_03_net:
        ipv4_address: 172.35.13.254
      F_external_host_04_net:
        ipv4_address: 172.35.14.254
      F_external_host_05_net:
        ipv4_address: 172.35.15.254
    command: sh -c "iptables -F && iptables -t nat -F; iptables -P FORWARD ACCEPT; iptables -A FORWARD -m conntrack --ctstate
      ESTABLISHED,RELATED -j ACCEPT; echo 'GW ready'; sleep infinity"
  server:
    image: nginx:latest
    container_name: master-thesis-server
    networks:
      A_server_net:
        ipv4_address: 172.30.10.10
  server_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-server-route
    network_mode: service:server
    depends_on:
    - server
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.10.254; sleep infinity"
  A_internal_host_01:
    image: curlimages/curl:latest
    container_name: master-thesis-A_internal_host_01
    command: sleep infinity
    networks:
