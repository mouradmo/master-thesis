  capture:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-capture
    network_mode: service:gw
    depends_on:
    - gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    volumes:
    - ./:/data
    command: sh -c "tcpdump -U -i any -nn -s 0 '(net 172.30.10.0/24 or net 172.30.11.0/24 or net 172.30.12.0/24 or net 172.30.13.0/24
      or net 172.30.14.0/24 or net 172.30.15.0/24 or net 172.30.16.0/24 or net 172.31.11.0/24 or net 172.32.11.0/24 or net
      172.33.11.0/24) and not arp' -w /data/gateway.pcap"
networks:
  A_server_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.10.0/24
  A_internal_host_01_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.11.0/24
  A_internal_host_02_net:
    driver: bridge
    ipam:
