services:
  gw:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      A_server_net:
        ipv4_address: 172.30.10.254
      A_internal_host_01_net:
        ipv4_address: 172.30.11.254
      A_internal_host_02_net:
        ipv4_address: 172.30.12.254
      A_internal_host_03_net:
        ipv4_address: 172.30.13.254
      A_internal_host_04_net:
        ipv4_address: 172.30.14.254
      A_internal_host_05_net:
        ipv4_address: 172.30.15.254
      A_internal_host_06_net:
        ipv4_address: 172.30.16.254
      B_external_host_01_net:
        ipv4_address: 172.31.11.254
      C_external_host_01_net:
        ipv4_address: 172.32.11.254
      D_external_host_01_net:
        ipv4_address: 172.33.11.254
    command: sh -c "iptables -F; iptables -t nat -F; iptables -t mangle -F; iptables -P INPUT ACCEPT; iptables -P OUTPUT ACCEPT;
      iptables -P FORWARD ACCEPT; echo 'GW ready'; sleep infinity"
  server:
    image: nginx:alpine
    container_name: master-thesis-server
    networks:
      A_server_net:
        ipv4_address: 172.30.10.10
    command: "sh -c \"cat > /etc/nginx/conf.d/default.conf <<'EOF'\nserver {\n  listen 80;\n  server_name server.local;\n\n\
      \  location = / {\n    default_type text/html;\n    return 200 '<html><body><h1>Internal test server</h1></body></html>\\\
      \\n';\n  }\n\n  location = /health {\n    default_type text/plain;\n    return 200 'healthy\\\\n';\n  }\n\n  location\
      \ = /index.html {\n    default_type text/html;\n    return 200 '<html><body><p>index page</p></body></html>\\\\n';\n\
      \  }\n}\n\nserver {\n  listen 80;\n  server_name c2.local;\n\n  location = / {\n    default_type application/json;\n\
      \    return 200 '{\\\"status\\\":\\\"online\\\"}\\\\n';\n  }\n\n  location = /api/beacon {\n    default_type application/json;\n\
      \    return 200 '{\\\"cmd\\\":\\\"sleep\\\",\\\"seconds\\\":5}\\\\n';\n  }\n\n  location = /api/task {\n    default_type\
      \ application/json;\n    return 200 '{\\\"task\\\":\\\"noop\\\"}\\\\n';\n  }\n}\n\nserver {\n  listen 80;\n  server_name\
      \ api.ipify.org ipify.org;\n\n  location = / {\n    default_type text/plain;\n    return 200 '203.0.113.10\\\\n';\n\
      \  }\n}\n\nserver {\n  listen 80 default_server;\n  server_name _;\n\n  location = / {\n    default_type text/html;\n\
      \    return 200 '<html><body><h1>Generic web reply</h1></body></html>\\\\n';\n  }\n\n  location = /robots.txt {\n  \
      \  default_type text/plain;\n    return 200 'User-agent: *\\\\nDisallow:\\\\n';\n  }\n}\nEOF\nnginx -g 'daemon off;'\n\
      \""
  server_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-server-route
    network_mode: service:server
    depends_on:
    - server
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.10.254; sleep infinity"
  dns:
    image: coredns/coredns:latest
    container_name: master-thesis-dns
    networks:
      A_server_net:
        ipv4_address: 172.30.10.53
    volumes:
    - ./Corefile:/Corefile:ro
    command:
    - -conf
    - /Corefile
  dns_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-dns-route
    network_mode: service:dns
    depends_on:
    - dns
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.10.254; sleep infinity"
  A_internal_host_01:
    image: curlimages/curl:latest
    container_name: master-thesis-A_internal_host_01
    command: sleep infinity
    dns:
    - 172.30.10.53
    dns_search:
    - local
    networks:
      A_internal_host_01_net:
        ipv4_address: 172.30.11.11
  A_internal_host_01_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-A_internal_host_01-route
    network_mode: service:A_internal_host_01
