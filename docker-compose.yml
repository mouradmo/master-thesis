services:
  gw:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      A_server_net:
        ipv4_address: 172.30.10.254
      A_internal_host_01_net:
        ipv4_address: 172.30.11.254
      B_external_host_01_net:
        ipv4_address: 172.31.11.254
      C_external_host_01_net:
        ipv4_address: 172.32.11.254
    command: sh -c "iptables -F; iptables -t nat -F; iptables -t mangle -F; iptables -P INPUT ACCEPT; iptables -P OUTPUT ACCEPT;
      iptables -P FORWARD ACCEPT; echo 'GW ready'; sleep infinity"
  A_internal_host_01:
    image: curlimages/curl:latest
    container_name: master-thesis-A_internal_host_01
    command: sleep infinity
    networks:
      A_internal_host_01_net:
        ipv4_address: 172.30.11.11
  A_internal_host_01_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-A_internal_host_01-route
    network_mode: service:A_internal_host_01
    depends_on:
    - A_internal_host_01
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.11.254; sleep infinity"
  B_external_host_01:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-B_external_host_01
    command: sleep infinity
    cap_add:
    - NET_ADMIN
    - NET_RAW
    networks:
      B_external_host_01_net:
        ipv4_address: 172.31.11.11
  B_external_host_01_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-B_external_host_01-route
    network_mode: service:B_external_host_01
    depends_on:
    - B_external_host_01
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.31.11.254; sleep infinity"
  C_external_host_01:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-C_external_host_01
    command: sleep infinity
    cap_add:
    - NET_ADMIN
    - NET_RAW
    networks:
      C_external_host_01_net:
        ipv4_address: 172.32.11.11
  C_external_host_01_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-C_external_host_01-route
    network_mode: service:C_external_host_01
    depends_on:
    - C_external_host_01
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.32.11.254; sleep infinity"
  capture:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-capture
    profiles:
    - capture
    network_mode: service:gw
    depends_on:
    - gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    volumes:
    - ./:/data
    command: sh -c "tcpdump -U -i any -nn -s 0 '(net 172.30.10.0/24 or net 172.30.11.0/24 or net 172.31.11.0/24 or net 172.32.11.0/24)
      and not arp' -w /data/gateway.pcap"
networks:
  A_server_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.10.0/24
  A_internal_host_01_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.11.0/24
  B_external_host_01_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.31.11.0/24
  C_external_host_01_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.32.11.0/24
