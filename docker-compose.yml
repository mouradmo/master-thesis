    container_name: master-thesis-capture
    network_mode: service:gw
    depends_on:
    - gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    volumes:
    - ./:/data
    command: sh -c "tcpdump -U -i any -nn -s 0 '(net 172.30.10.0/24 or net 172.30.11.0/24 or net 172.30.12.0/24 or net 172.31.11.0/24
      or net 172.31.12.0/24 or net 172.32.11.0/24 or net 172.32.12.0/24 or net 172.32.13.0/24 or net 172.33.11.0/24 or net
