networks:
  A_server_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.10.0/24
  A_internal_host_01_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.11.0/24
  A_internal_host_02_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.12.0/24
  B_external_host_01_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.31.11.0/24
  B_external_host_02_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.31.12.0/24
  C_external_host_01_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.32.11.0/24
  C_external_host_02_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.32.12.0/24
  D_external_host_01_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.33.11.0/24
  D_external_host_02_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.33.12.0/24
services:
  gw:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      A_server_net:
        ipv4_address: 172.30.10.254
      A_internal_host_01_net:
        ipv4_address: 172.30.11.254
      A_internal_host_02_net:
        ipv4_address: 172.30.12.254
      B_external_host_01_net:
        ipv4_address: 172.31.11.254
      B_external_host_02_net:
        ipv4_address: 172.31.12.254
      C_external_host_01_net:
        ipv4_address: 172.32.11.254
      C_external_host_02_net:
        ipv4_address: 172.32.12.254
      D_external_host_01_net:
        ipv4_address: 172.33.11.254
      D_external_host_02_net:
        ipv4_address: 172.33.12.254
    command: sh -c "iptables -F && iptables -t nat -F; iptables -P FORWARD ACCEPT; iptables -A FORWARD -m conntrack --ctstate
      ESTABLISHED,RELATED -j ACCEPT; echo 'GW ready'; sleep infinity"
  server:
    image: nginx:latest
    container_name: master-thesis-server
    networks:
      A_server_net:
        ipv4_address: 172.30.10.10
  server_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-server-route
    network_mode: service:server
    depends_on:
    - server
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.10.254; sleep infinity"
  A_internal_host_01:
    image: curlimages/curl:latest
    container_name: master-thesis-A_internal_host_01
    command: sleep infinity
    networks:
      A_internal_host_01_net:
        ipv4_address: 172.30.11.11
  A_internal_host_01_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-A_internal_host_01-route
    network_mode: service:A_internal_host_01
    depends_on:
    - A_internal_host_01
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.11.254; sleep infinity"
  A_internal_host_02:
    image: curlimages/curl:latest
    container_name: master-thesis-A_internal_host_02
    command: sleep infinity
    networks:
