#version: "3.9"

networks:
  testnet:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-testnet
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:
  server:
    image: nginx
    networks:
      testnet:
        ipv4_address: 172.30.0.10


  client1:
    image: curlimages/curl
    command: sleep infinity
    networks:
      testnet:
        ipv4_address: 172.30.0.11

  client2:
    image: curlimages/curl
    command: sleep infinity
    networks:
      testnet:
        ipv4_address: 172.30.0.12

  client3:
    image: curlimages/curl
    command: sleep infinity
    networks:
      testnet:
        ipv4_address: 172.30.0.13
      
  attacker:
    image: nicolaka/netshoot
    command: sleep infinity
    networks:
      testnet:
        ipv4_address: 172.30.0.100

  sensor:
    image: nicolaka/netshoot
    # sensor: captures HTTP traffic to the server (ARP filtered)
    network_mode: host
    cap_add:
    - NET_ADMIN
    - NET_RAW
    volumes:
    - ./pcaps:/pcaps
    command: >
      sh -c "tcpdump -U -i br-testnet -nn -s 0
      'host 172.30.0.10 and (tcp or udp or icmp) and not arp'
      -w /pcaps/captures.pcap"
