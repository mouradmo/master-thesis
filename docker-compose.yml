networks:
  A_zone_server_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.10.0/24
  A_zone_client_1_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.11.0/24
  A_zone_client_2_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.30.12.0/24
  B_zone_host_1_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.31.11.0/24
  B_zone_host_2_net:
    driver: bridge
    ipam:
      config:
      - subnet: 172.31.12.0/24
services:
  gw:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    sysctls:
      net.ipv4.ip_forward: '1'
    networks:
      A_zone_server_net:
        ipv4_address: 172.30.10.254
      A_zone_client_1_net:
        ipv4_address: 172.30.11.254
      A_zone_client_2_net:
        ipv4_address: 172.30.12.254
      B_zone_host_1_net:
        ipv4_address: 172.31.11.254
      B_zone_host_2_net:
        ipv4_address: 172.31.12.254
    command: sh -c "iptables -F && iptables -t nat -F; iptables -P FORWARD ACCEPT; iptables -A FORWARD -m conntrack --ctstate
      ESTABLISHED,RELATED -j ACCEPT; echo 'GW ready'; sleep infinity"
  server:
    image: nginx:latest
    container_name: master-thesis-server
    networks:
      A_zone_server_net:
        ipv4_address: 172.30.10.10
  server_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-server-route
    network_mode: service:server
    depends_on:
    - server
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.10.254; sleep infinity"
  A_zone_client_1:
    image: curlimages/curl:latest
    container_name: master-thesis-A_zone_client_1
    command: sleep infinity
    networks:
      A_zone_client_1_net:
        ipv4_address: 172.30.11.11
  A_zone_client_1_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-A_zone_client_1-route
    network_mode: service:A_zone_client_1
    depends_on:
    - A_zone_client_1
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.11.254; sleep infinity"
  A_zone_client_2:
    image: curlimages/curl:latest
    container_name: master-thesis-A_zone_client_2
    command: sleep infinity
    networks:
      A_zone_client_2_net:
        ipv4_address: 172.30.12.12
  A_zone_client_2_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-A_zone_client_2-route
    network_mode: service:A_zone_client_2
    depends_on:
    - A_zone_client_2
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.30.12.254; sleep infinity"
  B_zone_host_1:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-B_zone_host_1
    cap_add:
    - NET_ADMIN
    - NET_RAW
    networks:
      B_zone_host_1_net:
        ipv4_address: 172.31.11.11
    command: sleep infinity
  B_zone_host_1_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-B_zone_host_1-route
    network_mode: service:B_zone_host_1
    depends_on:
    - B_zone_host_1
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.31.11.254; sleep infinity"
  B_zone_host_2:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-B_zone_host_2
    cap_add:
    - NET_ADMIN
    - NET_RAW
    networks:
      B_zone_host_2_net:
        ipv4_address: 172.31.12.12
    command: sleep infinity
  B_zone_host_2_route:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-B_zone_host_2-route
    network_mode: service:B_zone_host_2
    depends_on:
    - B_zone_host_2
    - gw
    cap_add:
    - NET_ADMIN
    command: sh -c "ip route del default 2>/dev/null || true; ip route add default via 172.31.12.254; sleep infinity"
  capture:
    image: nicolaka/netshoot:latest
    container_name: master-thesis-capture
    network_mode: service:gw
    depends_on:
    - gw
    cap_add:
    - NET_ADMIN
    - NET_RAW
    volumes:
    - ./:/data
    command: sh -c "tcpdump -U -i any -nn -s 0 '(net 172.30.10.0/24 or net 172.30.11.0/24 or net 172.30.12.0/24 or net 172.31.11.0/24
      or net 172.31.12.0/24) and not arp' -w /data/gateway.pcap"
