name: master-thesis
services:
  server:
    image: mcr.microsoft.com/powershell:windowsservercore-ltsc2022
    container_name: master-thesis-server
    networks:
      A_server_net:
        ipv4_address: 172.30.10.10
    command: powershell -NoLogo -NoProfile -Command "$$ErrorActionPreference='Stop'; $$listener = [System.Net.HttpListener]::new();
      $$listener.Prefixes.Add('http://+:80/'); $$listener.Start(); Write-Host 'HTTP server listening on :80'; while ($$true)
      {   $$ctx = $$listener.GetContext();   $$resp = $$ctx.Response;   $$bytes = [System.Text.Encoding]::ASCII.GetBytes('ok');   $$resp.StatusCode
      = 200;   $$resp.ContentType = 'text/plain';   $$resp.ContentLength64 = $$bytes.Length;   $$resp.OutputStream.Write($$bytes,
      0, $$bytes.Length);   $$resp.OutputStream.Close(); } "
networks:
  A_server_net:
    driver: nat
    ipam:
      config:
      - subnet: 172.30.10.0/24
        gateway: 172.30.10.1
